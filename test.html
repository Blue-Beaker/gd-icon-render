<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GD Icon Render 测试</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  h1 { margin-bottom: 0.5rem; font-weight: 500; }
  p { color: #888; margin-bottom: 1.5rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1rem;
    max-width: 800px;
    width: 100%;
  }
  .card {
    background: #16213e;
    border-radius: 12px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }
  .card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: contain;
    image-rendering: pixelated;
    border-radius: 8px;
  }
  .card .label {
    font-size: 0.75rem;
    color: #888;
    text-align: center;
    word-break: break-all;
  }
  .refresh {
    margin-top: 1.5rem;
    padding: 0.6rem 2rem;
    background: #0f3460;
    color: #eee;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .refresh:hover { background: #1a5276; }
  .loading { color: #555; margin-top: 2rem; }
</style>
</head>
<body>
  <h1>🎨 GD 图标预览</h1>
  <p>随机展示 10 个图标</p>
  <div class="grid" id="grid"></div>
  <button class="refresh" id="refreshBtn">🔄 刷新</button>
  <p class="loading" id="loading">加载中…</p>

  <script>
    const grid = document.getElementById('grid');
    const loading = document.getElementById('loading');

    async function loadIcons() {
      grid.innerHTML = '';
      loading.style.display = 'block';

      const requests = [];
      for (let i = 0; i < 10; i++) {
        requests.push(
          fetch('/random', { redirect: 'follow' })
            .then(r => {
              if (!r.ok) throw new Error(`HTTP ${r.status}`);
              return r.blob();
            })
            .then(blob => URL.createObjectURL(blob))
        );
      }

      const urls = await Promise.all(requests);
      loading.style.display = 'none';

      urls.forEach(url => {
        const card = document.createElement('div');
        card.className = 'card';
        const img = document.createElement('img');
        img.src = url;
        img.alt = 'GD Icon';
        card.appendChild(img);
        grid.appendChild(card);
      });
    }

    document.getElementById('refreshBtn').addEventListener('click', loadIcons);
    loadIcons();
  </script>
</body>
</html>
